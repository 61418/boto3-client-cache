name: Push

on:
  push:
    branches: [main]
    paths:
      - "boto3_client_cache/**"
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Setup, Lint, and Test
    runs-on: ubuntu-latest
    if: ${{ !(github.actor == 'github-actions[bot]' && contains(github.event.head_commit.message, '[skip ci]')) }}
    steps:
      - name: Check-Out Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          cache-dependency-glob: "**/pyproject.toml"

      - name: Cache uv Dependencies
        id: cached-uv-dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Dependencies
        if: steps.cached-uv-dependencies.outputs.cache-hit != 'true'
        run: uv sync --all-groups

      - name: Check Formatting with Ruff
        run: uv run ruff format --check .

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run Unit Tests
        run: uv run pytest tests/ -v

  changes:
    name: Detect Changed Paths
    needs: checks
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.filter.outputs.release }}
      docs_or_code: ${{ steps.filter.outputs.docs_or_code }}
    steps:
      - name: Check-Out Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            release:
              - "boto3_client_cache/**"
              - "README.md"
              - "pyproject.toml"
              - "LICENSE"
            docs_or_code:
              - "boto3_client_cache/**"
              - "docs/**"
              - "pyproject.toml"

  release:
    name: Release Please and Publish to PyPI
    needs: [checks, changes]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.release == 'true'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Check-Out Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: python
          target-branch: main

      - name: Check-Out Repository at Released SHA
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.release.outputs.sha }}

      - name: Setup Python
        if: steps.release.outputs.release_created == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Install uv
        if: steps.release.outputs.release_created == 'true'
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          cache-dependency-glob: "**/pyproject.toml"

      - name: Build package
        if: steps.release.outputs.release_created == 'true'
        run: uv build

      - name: Publish package to PyPI
        if: steps.release.outputs.release_created == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  docs:
    name: Build and Deploy Docs
    needs: [checks, changes, release]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.changes.outputs.docs_or_code == 'true' &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    permissions:
      contents: write
    steps:
      - name: Check-Out Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          cache-dependency-glob: "**/pyproject.toml"

      - name: Cache uv Dependencies
        id: cached-uv-dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Dependencies
        if: steps.cached-uv-dependencies.outputs.cache-hit != 'true'
        run: uv sync --all-groups

      - name: Build docs
        run: uv run --directory docs make clean html

      - name: Disable Jekyll for built docs directory
        run: touch docs/_build/html/.nojekyll

      - name: Deploy docs to gh-pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          destination_dir: docs
          enable_jekyll: false
          force_orphan: true
